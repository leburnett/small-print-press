<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Print Press</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1A1A;
    --ink-light: #4A4A4A;
    --ink-faint: #8A8A8A;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: white;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════
     NAV
  ═══════════════════════════════════════ */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .nav-logo a {
    color: inherit;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--ink);
  }

  .nav-icon {
    display: flex;
    align-items: center;
  }

  /* ═══════════════════════════════════════
     HERO
  ═══════════════════════════════════════ */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 2rem;
  }

  .hero-title {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-size: clamp(1.1rem, 2.4vw, 1.75rem);
    line-height: 1.1;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 0.4rem 1rem;
    border: 1.75px solid var(--ink);
    display: inline-block;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .hero-subtitle {
    font-family: 'Crimson Pro', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.8rem, 1.6vw, 1rem);
    color: var(--ink-faint);
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
    position: relative;
    cursor: none;
  }

  /* ═══════════════════════════════════════
     MAGNIFYING GLASS
  ═══════════════════════════════════════ */
  .magnifier {
    position: fixed;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid var(--ink);
    box-shadow: inset 0 0 0 3px white, inset 0 0 0 6px var(--ink);
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.2s ease;
    background: white;
  }

  .magnifier.active {
    opacity: 1;
  }

  .magnifier-handle {
    position: fixed;
    width: 14px;
    height: 44px;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 3px;
    pointer-events: none;
    z-index: 49;
    opacity: 0;
    transition: opacity 0.2s ease;
    transform-origin: top center;
  }

  .magnifier-handle::before,
  .magnifier-handle::after {
    content: '';
    position: absolute;
    left: 1px;
    right: 1px;
    height: 3px;
    border-top: 2px solid var(--ink);
  }

  .magnifier-handle::before {
    top: 4px;
  }

  .magnifier-handle::after {
    top: 10px;
  }

  .magnifier-handle.active {
    opacity: 1;
  }

  .magnifier-text {
    position: absolute;
    white-space: nowrap;
    font-family: 'Crimson Pro', serif;
    font-weight: 300;
    font-style: italic;
    color: var(--ink-faint);
    font-size: clamp(1.6rem, 3.2vw, 2rem);
    letter-spacing: 0.02em;
  }

  /* Glass glint */
  .magnifier::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 14px;
    width: 24px;
    height: 18px;
    border-left: 2px solid rgba(0, 0, 0, 0.12);
    border-radius: 50%;
    transform: rotate(-20deg);
    pointer-events: none;
  }

  /* ═══════════════════════════════════════
     ANIMATIONS
  ═══════════════════════════════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ═══════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════ */
  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-links a { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><a href="/">Small Print Press</a></div>
  <ul class="nav-links">
    <li><a href="/portfolio.html">Portfolio</a></li>
    <li><a href="/printclub.html">Print Club</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/contact.html">Contact</a></li>
    <li><a href="#" class="nav-icon" target="_blank" rel="noopener" aria-label="Instagram"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">SMALL PRINT PRESS</h1>
  <p class="hero-subtitle">'cause the important stuff is often overlooked</p>
</section>

<!-- MAGNIFIER -->
<div class="magnifier" id="magnifier">
  <span class="magnifier-text" id="magnifierText">'cause the important stuff is often overlooked</span>
</div>
<div class="magnifier-handle" id="magnifierHandle"></div>

<script>
const subtitle = document.querySelector('.hero-subtitle');
const magnifier = document.getElementById('magnifier');
const magnifierHandle = document.getElementById('magnifierHandle');
const magnifierText = document.getElementById('magnifierText');
const radius = 60;

subtitle.addEventListener('mouseenter', () => {
  magnifier.classList.add('active');
  magnifierHandle.classList.add('active');
});

subtitle.addEventListener('mouseleave', () => {
  magnifier.classList.remove('active');
  magnifierHandle.classList.remove('active');
});

subtitle.addEventListener('mousemove', (e) => {
  const magX = e.clientX - radius;
  const magY = e.clientY - radius;
  magnifier.style.left = magX + 'px';
  magnifier.style.top = magY + 'px';

  // Position handle at bottom-right of lens
  const handleX = e.clientX + radius * 0.5 - 7;
  const handleY = e.clientY + radius * 0.5;
  magnifierHandle.style.left = handleX + 'px';
  magnifierHandle.style.top = handleY + 'px';
  magnifierHandle.style.transform = 'rotate(-45deg)';

  // Position the magnified text relative to the original text
  const subtitleRect = subtitle.getBoundingClientRect();
  const scale = 2;
  const textX = -(e.clientX - subtitleRect.left) * scale + radius;
  const textY = -(e.clientY - subtitleRect.top) * scale + radius;
  magnifierText.style.left = textX + 'px';
  magnifierText.style.top = textY + 'px';
});
</script>

</body>
</html>
