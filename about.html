<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — Small Print Press</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='white'/><rect x='22' y='32' width='56' height='36' rx='3' fill='none' stroke='%231A1A1A' stroke-width='3'/><path d='M22,34 L50,55 L78,34' fill='none' stroke='%231A1A1A' stroke-width='3' stroke-linejoin='round'/></svg>" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1A1A;
    --ink-light: #4A4A4A;
    --ink-faint: #8A8A8A;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: white;
    color: var(--ink);
    min-height: 100vh;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .nav-logo a {
    color: inherit;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--ink);
  }

  .nav-icon {
    display: flex;
    align-items: center;
  }

  .content {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 2rem;
  }

  .content h1 {
    font-family: 'Crimson Pro', serif;
    font-weight: 300;
    font-size: 2rem;
    color: var(--ink);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .content p {
    font-weight: 300;
    font-size: 1rem;
    color: var(--ink-faint);
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-links a { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>

  <ul class="nav-links">

  </ul>
</nav>

<section class="content">
  <h1>About</h1>
  <p>Coming soon.</p>
</section>

</body>
</html>
